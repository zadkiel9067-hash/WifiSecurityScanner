# فایل: gradle/wrapper/gradle-wrapper.properties
#
# این فایل تنظیمات Gradle Wrapper هست
# وقتی کاربر ./gradlew build رو اجرا کنه، 
# به صورت خودکار:
# 1. Gradle رو دانلود میکنه
# 2. gradle-wrapper.jar رو میسازه
# 3. پروژه رو build میکنه
#

distributionBase=GRADLE_USER_HOME
distributionPath=wrapper/dists
distributionUrl=https\://services.gradle.org/distributions/gradle-8.2-bin.zip
zipStoreBase=GRADLE_USER_HOME
zipStorePath=wrapper/dists

# تنظیمات اضافی برای دانلود خودکار
org.gradle.jvmargs=-Xmx2048m
org.gradle.daemon=true
org.gradle.parallel=true
org.gradle.caching=true
